name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

permissions:
  id-token: write
  contents: write
  pull-requests: write
  actions: write

jobs:
  lint:
    name: Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13', '3.14']
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run lint and format checks
        run: uv run poe format

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13', '3.14']
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: uv run poe test

  update-hooks:
    name: Update pre-commit hooks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.13'

      - name: Autoupdate pre-commit hooks
        run: uv run pre-commit autoupdate

      - name: Commit updated hooks
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .pre-commit-config.yaml
          git diff --staged --quiet || git commit -m "chore(config): update pre-commit hooks"
          git push origin "HEAD:${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"

  breaking-changes:
    name: Detect breaking changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [lint, test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.13'

      - name: Get proposed version
        id: proposed
        run: |
          VERSION=$(pipx run --spec python-semantic-release semantic-release --noop version --print)
          echo "proposed=$VERSION" >> $GITHUB_OUTPUT

      - name: Run pycracks
        id: pycracks
        continue-on-error: true
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          pipx run pycracks \
            --path "tests" \
            --target-version "${{ steps.proposed.outputs.proposed }}" \
            --test-command "uv run poe test"

      - name: Create breaking change commit
        if: steps.pycracks.outcome == 'failure'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git commit --allow-empty \
            -m "feat!: breaking change detected [skip ci]"
          git push origin main

  versioning:
    name: Versioning
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [breaking-changes]
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.13'

      - name: Bump version and update changelog
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && needs.versioning.outputs.released == 'true'
    needs: [versioning]
    environment:
      name: pypi
      url: https://pypi.org/p/helix-memory
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.13'

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
